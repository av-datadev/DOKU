<style>
  :root{
    --bg: #0E0C0A;
    --bg-card: #161310;
    --ivory: #EDE6D6;
    --muted: #9A9086;
    --gold: #B08D57;
    --gold-soft: rgba(176,141,87,0.12);
    --gold-mid: rgba(176,141,87,0.25);
    --hairline: #2B2620;
    --claimed: #6B6258;
    --ease: cubic-bezier(.16,1,.3,1);
    --ease-out: cubic-bezier(.22,1,.36,1);
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html{ scroll-behavior:smooth; }
  body{
    background: var(--bg);
    color: var(--ivory);
    font-family: 'Archivo', sans-serif;
    font-weight: 400;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }
  .serif{ font-family:'Fraunces', serif; }
  a{ color:inherit; }
  button{ font-family:inherit; }
  img,svg{ display:block; max-width:100%; }
  :focus-visible{ outline:1px solid var(--gold); outline-offset:3px; }

  /* ── VEIL ── */
  #veil{
    position:fixed; inset:0; background:var(--bg);
    z-index:9998; opacity:0; pointer-events:none;
    transition: opacity .35s var(--ease);
  }
  #veil.active{ opacity:1; pointer-events:all; }
  #veil .veil-line{
    position:absolute; top:50%; left:0; width:0%; height:1px; background:var(--gold);
    transition: width .45s var(--ease);
  }
  #veil.active .veil-line{ width:100%; }

  #ambient-glow{ position:fixed; inset:0; z-index:0; pointer-events:none; overflow:hidden; }
  #ambient-glow .glow{
    position:absolute; border-radius:50%; pointer-events:none;
  }
  #ambient-glow .glow.g1{
    width:52vw; height:52vw;
    background: radial-gradient(circle, rgba(176,141,87,0.055), transparent 70%);
    top:-8%; left:-10%;
    animation: drift1 64s ease-in-out infinite alternate;
  }
  #ambient-glow .glow.g2{
    width:44vw; height:44vw;
    background: radial-gradient(circle, rgba(176,141,87,0.06), transparent 70%);
    animation: drift2 68s ease-in-out infinite alternate;
  }
  @keyframes drift1{ 0%{top:-12%;left:-8%;} 50%{top:28%;left:48%;} 100%{top:55%;left:6%;} }
  @keyframes drift2{ 0%{top:58%;left:62%;} 50%{top:12%;left:22%;} 100%{top:38%;left:72%;} }

  #dust{ position:fixed; inset:0; z-index:1; pointer-events:none; overflow:hidden; }
  .mote{
    position:absolute; bottom:-10px; border-radius:50%; background:var(--gold); opacity:0;
    animation-name:rise; animation-timing-function:linear; animation-iteration-count:infinite;
  }
  @keyframes rise{
    0%{ opacity:0; transform:translateY(0) translateX(0); }
    10%{ opacity:0.4; }
    85%{ opacity:0.18; }
    100%{ opacity:0; transform:translateY(-110vh) translateX(18px); }
  }
  .frame-sketch::before, .frame-waiting::before{
    content:''; position:absolute; inset:30%; border-radius:50%; z-index:0;
    background:radial-gradient(circle, rgba(176,141,87,0.28), transparent 70%);
    animation:breathe 5s ease-in-out infinite;
  }
  @keyframes breathe{
    0%,100%{ opacity:0.4; transform:scale(0.9); }
    50%{ opacity:0.95; transform:scale(1.08); }
  }
  @media (prefers-reduced-motion:reduce){
    #ambient-glow .glow{ animation:none; }
    #ambient-glow .glow.g1{ top:15%; left:10%; }
    #ambient-glow .glow.g2{ top:45%; left:60%; }
    .mote{ display:none; }
    .frame-sketch::before, .frame-waiting::before{ animation:none; opacity:0.55; }
    .hero-eyebrow, .hero-headline, .hero-divider, .hero-meta, .hero-cta, .hero-scroll{ animation:none; opacity:1; transform:none; }
    .marquee-track{ animation:none; }
    .reveal{ opacity:1; transform:none; transition:none; }
    #veil, #veil .veil-line, main#app, #mobile-menu{ transition:none; }
  }

  /* ── CURSOR ── */
  #cursor{
    position:fixed; top:0; left:0; width:24px; height:24px;
    border:1px solid var(--gold); border-radius:50%; pointer-events:none; z-index:10000;
    display:flex; align-items:center; justify-content:center;
    transform:translate(-50%,-50%);
    transition: width .25s var(--ease), height .25s var(--ease), background-color .25s var(--ease), border-color .25s var(--ease);
    opacity:0;
  }
  #cursor.ready{ opacity:1; }
  #cursor.hover{ width:42px; height:42px; background:var(--gold-soft); }
  #cursor.labeled{ width:68px; height:68px; background:var(--gold-soft); border-color:transparent; }
  #cursor.click{ transform:translate(-50%,-50%) scale(0.85); }
  #cursor-label{ font-size:10px; letter-spacing:0.1em; text-transform:uppercase; color:var(--gold); opacity:0; transition:opacity .2s var(--ease); white-space:nowrap; }
  #cursor.labeled #cursor-label{ opacity:1; }
  @media (hover:hover) and (pointer:fine){
    html, body, a, button{ cursor:none; }
    select{ cursor:auto; }
  }
  @media (hover:none),(pointer:coarse){ #cursor{ display:none; } }

  /* ── NAV ── */
  header{
    display:flex; justify-content:space-between; align-items:center;
    padding:26px 48px;
    position:sticky; top:0; z-index:500;
    background:var(--bg);
    border-bottom:1px solid var(--hairline);
    transition: padding .4s var(--ease), border-color .4s var(--ease), backdrop-filter .4s;
  }
  header.scrolled{
    padding:18px 48px;
    background:rgba(14,12,10,0.92);
    backdrop-filter:blur(16px);
    -webkit-backdrop-filter:blur(16px);
    border-bottom-color:rgba(43,38,32,0.6);
  }
  .logo{
    font-family:'Fraunces', serif; font-size:22px; letter-spacing:0.14em;
    font-weight:500; text-decoration:none;
    transition: letter-spacing .4s var(--ease);
  }
  header.scrolled .logo{ letter-spacing:0.18em; }
  .nav-links{
    display:flex; align-items:center; gap:36px;
    font-size:11px; letter-spacing:0.14em; text-transform:uppercase; color:var(--muted);
  }
  .nav-links a{ text-decoration:none; color:var(--muted); transition:color .3s; padding:4px 0; position:relative; }
  .nav-links a::after{
    content:''; position:absolute; bottom:-2px; left:0; width:0; height:1px;
    background:var(--gold); transition:width .35s var(--ease);
  }
  .nav-links a:hover{ color:var(--ivory); }
  .nav-links a:hover::after{ width:100%; }
  .nav-links a.active{ color:var(--ivory); }
  .nav-links a.active::after{ width:100%; }
  .cart-link{ display:flex; align-items:center; gap:7px; }
  .cart-count{
    display:inline-flex; align-items:center; justify-content:center;
    min-width:17px; height:17px; padding:0 4px;
    border:1px solid var(--gold); color:var(--gold); border-radius:50%;
    font-size:10px; transition: transform .3s var(--ease), background .3s;
  }
  .cart-count[hidden]{ display:none; }
  .cart-count.bump{ transform:scale(1.35); background:var(--gold-soft); }
  .menu-btn{ display:none; background:none; border:none; color:var(--ivory); cursor:pointer; padding:6px; }
  .menu-btn span{ display:block; width:22px; height:1px; background:var(--ivory); margin:5px 0; transition:transform .3s, opacity .3s; }
  .header-right{ display:flex; align-items:center; gap:32px; }
  .currency-select-wrap select{
    background:transparent; border:none; border-bottom:1px solid var(--hairline);
    color:var(--muted); font-family:'Archivo', sans-serif; font-size:11px;
    letter-spacing:0.1em; text-transform:uppercase; padding:4px 16px 4px 0;
    cursor:pointer; appearance:none;
    background-image:linear-gradient(45deg,transparent 50%,var(--gold) 50%),linear-gradient(135deg,var(--gold) 50%,transparent 50%);
    background-position:calc(100% - 8px) center,calc(100% - 3px) center;
    background-size:5px 5px,5px 5px; background-repeat:no-repeat;
    transition:color .3s, border-color .3s;
  }
  .currency-select-wrap select:hover,.currency-select-wrap select:focus{ color:var(--ivory); border-color:var(--gold); outline:none; }
  .currency-select-wrap select option{ background:var(--bg-card); color:var(--ivory); }
  #mobile-menu{
    position:fixed; inset:0; background:var(--bg); z-index:900;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:30px;
    opacity:0; pointer-events:none; transition:opacity .35s var(--ease);
  }
  #mobile-menu.open{ opacity:1; pointer-events:all; }
  #mobile-menu a{ font-family:'Fraunces', serif; font-size:28px; text-decoration:none; color:var(--ivory); }
  #mobile-menu .close-btn{ position:absolute; top:28px; right:28px; background:none; border:none; color:var(--muted); font-size:12px; letter-spacing:0.18em; text-transform:uppercase; cursor:pointer; }

  /* ── APP ── */
  main#app{ min-height:60vh; position:relative; z-index:2; }

  /* ── REVEALS ── */
  .reveal{
    opacity:0; transform:translateY(20px);
    transition:opacity .9s var(--ease), transform .9s var(--ease);
  }
  .reveal.in{ opacity:1; transform:none; }

  /* ── LAYOUT ── */
  .wrap{ max-width:1100px; margin:0 auto; padding:0 48px; }
  .eyebrow{ font-size:10px; letter-spacing:0.28em; text-transform:uppercase; color:var(--gold); margin-bottom:16px; }

  /* ── HERO ── */
  .hero{
    min-height:100svh; display:grid; place-items:center;
    text-align:center; position:relative; overflow:hidden;
    padding:140px 24px 100px;
  }
  .hero-inner{ position:relative; z-index:2; }
  .hero-eyebrow{
    font-size:10px; letter-spacing:0.32em; text-transform:uppercase; color:var(--gold);
    margin-bottom:36px;
    opacity:0; transform:translateY(10px);
    animation:heroUp .8s var(--ease) .25s forwards;
  }
  .hero-headline{
    font-family:'Fraunces', serif; font-weight:200;
    font-size:clamp(68px,10.5vw,140px);
    line-height:0.92; letter-spacing:-0.02em;
    opacity:0; transform:translateY(24px);
    animation:heroUp 1.1s var(--ease) .5s forwards;
  }
  .hero-headline em{
    font-style:italic; color:var(--gold);
    font-weight:300; font-optical-sizing:auto;
  }
  .hero-rule{
    width:1px; height:56px;
    background:linear-gradient(to bottom, var(--gold), transparent);
    margin:42px auto;
    opacity:0;
    animation:heroUp .6s var(--ease) .95s forwards;
  }
  .hero-meta{
    display:flex; align-items:baseline; justify-content:center; gap:16px;
    font-size:12px; letter-spacing:0.14em; text-transform:uppercase; color:var(--muted);
    opacity:0; transform:translateY(8px);
    animation:heroUp .6s var(--ease) 1.1s forwards;
  }
  .hero-count{
    font-family:'Fraunces', serif; font-size:28px;
    color:var(--ivory); line-height:1; font-weight:300;
  }
  .hero-cta{
    display:inline-block; padding:17px 44px;
    border:1px solid rgba(176,141,87,0.6); color:var(--gold);
    font-size:11px; letter-spacing:0.22em; text-transform:uppercase;
    text-decoration:none; margin-top:50px;
    transition:background .38s var(--ease), color .38s var(--ease), border-color .38s var(--ease);
    opacity:0; transform:translateY(8px);
    animation:heroUp .7s var(--ease) 1.3s forwards;
    position:relative; overflow:hidden;
  }
  .hero-cta::before{
    content:''; position:absolute; inset:0;
    background:var(--gold); transform:translateX(-101%);
    transition:transform .45s var(--ease);
  }
  .hero-cta:hover{ color:var(--bg); border-color:var(--gold); }
  .hero-cta:hover::before{ transform:translateX(0); }
  .hero-cta span{ position:relative; z-index:1; }
  .hero-scroll{
    position:absolute; bottom:44px; left:50%; transform:translateX(-50%);
    display:flex; flex-direction:column; align-items:center; gap:10px;
    font-size:9px; letter-spacing:0.3em; text-transform:uppercase; color:var(--claimed);
    opacity:0; animation:heroUp .6s var(--ease) 1.7s forwards;
  }
  .hero-scroll-line{
    width:1px; height:44px;
    background:linear-gradient(to bottom, var(--gold), transparent);
    animation:scrollPulse 2.4s ease-in-out infinite;
  }
  @keyframes heroUp{ to{ opacity:1; transform:translateY(0); } }
  @keyframes scrollPulse{
    0%,100%{ opacity:0.25; transform:scaleY(0.7); transform-origin:top; }
    50%{ opacity:1; transform:scaleY(1); }
  }

  /* ── MARQUEE ── */
  .marquee{
    overflow:hidden; border-top:1px solid var(--hairline);
    border-bottom:1px solid var(--hairline); padding:17px 0;
    white-space:nowrap; user-select:none;
  }
  .marquee-track{
    display:inline-block;
    animation:marquee 34s linear infinite;
  }
  .marquee-track span{
    font-size:10px; letter-spacing:0.24em; text-transform:uppercase;
    color:var(--claimed); padding:0 28px;
  }
  .marquee-track .gold{ color:var(--gold); padding:0 6px; font-size:7px; }
  @keyframes marquee{ from{transform:translateX(0)} to{transform:translateX(-50%)} }

  /* ── MANIFESTO ── */
  .manifesto{
    padding:120px 48px; text-align:center;
    border-top:1px solid var(--hairline); border-bottom:1px solid var(--hairline);
  }
  .manifesto p{
    font-family:'Fraunces', serif; font-weight:200; font-style:italic;
    font-size:clamp(22px,3vw,36px); line-height:1.6; max-width:700px; margin:0 auto;
  }

  /* ── SECTION HEADS ── */
  .section-head{ padding:100px 48px 44px; text-align:center; }
  .section-head h2{ font-family:'Fraunces', serif; font-weight:300; font-size:36px; }
  .section-head p{ margin-top:14px; font-size:14px; color:var(--muted); max-width:460px; margin-left:auto; margin-right:auto; line-height:1.75; }
  .more{
    display:inline-block; margin-top:24px; font-size:10px;
    letter-spacing:0.18em; text-transform:uppercase; color:var(--gold);
    text-decoration:none; border-bottom:1px solid var(--gold); padding-bottom:3px;
    transition:letter-spacing .3s var(--ease);
  }
  .more:hover{ letter-spacing:0.24em; }

  /* ── DIVIDER ── */
  .gold-divider{
    width:48px; height:1px; background:var(--gold); margin:0 auto;
    display:block; opacity:0.5;
  }

  /* ── FRAME / PLACEHOLDER ── */
  .frame{
    position:relative; width:100%; aspect-ratio:4/5; background:var(--bg-card);
    border:1px solid var(--hairline);
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px;
    overflow:hidden;
  }
  .frame .corner{ position:absolute; width:16px; height:16px; transition:width .35s var(--ease), height .35s var(--ease); }
  .frame .corner.tl{ top:12px; left:12px; border-top:1px solid var(--gold); border-left:1px solid var(--gold); }
  .frame .corner.tr{ top:12px; right:12px; border-top:1px solid var(--gold); border-right:1px solid var(--gold); }
  .frame .corner.bl{ bottom:12px; left:12px; border-bottom:1px solid var(--gold); border-left:1px solid var(--gold); }
  .frame .corner.br{ bottom:12px; right:12px; border-bottom:1px solid var(--gold); border-right:1px solid var(--gold); }
  .item:hover .frame .corner{ width:22px; height:22px; }
  .frame-no{ font-family:'Fraunces', serif; font-size:13px; color:var(--claimed); letter-spacing:0.05em; }
  .frame-label{ font-size:10px; letter-spacing:0.18em; text-transform:uppercase; color:var(--claimed); }
  .frame img{ width:100%; height:100%; object-fit:cover; transition:transform .6s var(--ease); }
  .item:hover .frame img{ transform:scale(1.03); }
  .frame-faded img{ filter:grayscale(55%) brightness(0.72) contrast(0.95) saturate(0.65); }
  .frame-sketch .sketch-art{ width:58%; opacity:0.9; }
  .frame-sketch .sketch-art svg{ width:100%; height:auto; display:block; }
  .frame-sketch .frame-label{ position:absolute; bottom:14px; left:0; right:0; text-align:center; }
  .frame-reference{ position:relative; }
  .frame-reference .frame-label{
    position:absolute; bottom:0; left:0; right:0; margin:0; text-align:center;
    background:linear-gradient(to top, rgba(14,12,10,0.88), rgba(14,12,10,0));
    padding:18px 10px 10px; color:var(--ivory); opacity:0.9;
  }
  .archive-item .frame{ margin-bottom:16px; }

  /* ── COLLECTION GRID ── */
  .grid{
    display:grid; grid-template-columns:repeat(3,1fr);
    gap:1px; background:var(--hairline); border:1px solid var(--hairline);
  }
  .item{
    background:var(--bg); padding:36px 30px 30px;
    text-decoration:none; display:block; color:inherit;
    transition:background .38s var(--ease), box-shadow .38s var(--ease);
    position:relative;
  }
  .item::after{
    content:''; position:absolute; inset:0; pointer-events:none;
    box-shadow:inset 0 0 0 0 var(--gold-mid);
    transition:box-shadow .38s var(--ease);
  }
  .item:hover{ background:var(--bg-card); }
  .item:hover::after{ box-shadow:inset 0 0 0 1px var(--gold-mid); }
  .seal{
    width:46px; height:46px; border:1px solid var(--gold); border-radius:50%;
    display:flex; align-items:center; justify-content:center; margin-bottom:26px;
    transition:background .35s, transform .35s var(--ease);
  }
  .item:hover .seal{ background:var(--gold-soft); transform:scale(1.06); }
  .seal-no{ font-family:'Fraunces', serif; font-size:12px; color:var(--gold); letter-spacing:0.05em; }
  .item .frame{ margin-bottom:22px; }
  .item h3{ font-family:'Fraunces', serif; font-weight:400; font-size:19px; margin-bottom:8px; }
  .item-origin{ font-size:12px; color:var(--muted); margin-bottom:18px; }
  .item-bottom{
    display:flex; justify-content:space-between; align-items:baseline;
    border-top:1px solid var(--hairline); padding-top:14px;
    transform:translateY(0); transition:transform .3s var(--ease);
  }
  .item:hover .item-bottom{ transform:translateY(-2px); }
  .item-price{ font-family:'Fraunces', serif; font-size:15px; }
  .item-status{ font-size:10px; letter-spacing:0.14em; text-transform:uppercase; color:var(--gold); }
  .item.coming-card .seal{ border-style:dashed; }

  /* ── ARCHIVE GRID ── */
  .archive-grid{ display:grid; grid-template-columns:repeat(4,1fr); gap:1px; background:var(--hairline); border:1px solid var(--hairline); }
  .archive-item{ background:var(--bg); padding:26px 20px; opacity:0.58; transition:opacity .3s; }
  .archive-item:hover{ opacity:0.9; }
  .archive-item h4{ font-family:'Fraunces', serif; font-size:15px; font-weight:400; margin-bottom:6px; }
  .archive-item .origin{ font-size:11px; color:var(--muted); margin-bottom:12px; }
  .archive-item .epitaph{ font-size:12px; font-style:italic; color:var(--claimed); line-height:1.65; margin-bottom:12px; }
  .claimed-mark{
    font-size:10px; letter-spacing:0.15em; text-transform:uppercase;
    color:var(--claimed); border:1px solid var(--claimed); display:inline-block; padding:3px 8px;
  }

  /* ── PRODUCT DETAIL ── */
  .breadcrumb{ padding:28px 48px 0; font-size:11px; letter-spacing:0.1em; text-transform:uppercase; color:var(--claimed); }
  .breadcrumb a{ color:var(--claimed); text-decoration:none; transition:color .3s; }
  .breadcrumb a:hover{ color:var(--gold); }
  .product{ display:grid; grid-template-columns:1.1fr 1fr; gap:80px; padding:44px 48px 0; align-items:start; }
  .product-info{ padding-top:8px; }
  .seal-row{ display:flex; align-items:center; gap:14px; margin-bottom:28px; }
  .seal-status{ font-size:11px; letter-spacing:0.15em; text-transform:uppercase; color:var(--gold); }
  .seal-status.is-claimed{ color:var(--claimed); }
  .product-info h1{ font-family:'Fraunces', serif; font-weight:300; font-size:44px; line-height:1.12; margin-bottom:14px; }
  .origin-line{ font-size:14px; color:var(--muted); margin-bottom:36px; line-height:1.7; }
  .price-row{
    display:flex; justify-content:space-between; align-items:baseline;
    border-top:1px solid var(--hairline); border-bottom:1px solid var(--hairline);
    padding:22px 0; margin-bottom:32px;
  }
  .price{ font-family:'Fraunces', serif; font-size:26px; }
  .price-note{ font-size:11px; color:var(--claimed); letter-spacing:0.1em; text-transform:uppercase; }
  .btn-gold{
    width:100%; padding:18px; background:transparent;
    border:1px solid var(--gold); color:var(--gold);
    font-size:11px; letter-spacing:0.22em; text-transform:uppercase; cursor:pointer;
    margin-bottom:14px; position:relative; overflow:hidden;
    transition:color .38s var(--ease), border-color .38s;
  }
  .btn-gold::before{
    content:''; position:absolute; inset:0;
    background:var(--gold); transform:translateX(-101%);
    transition:transform .45s var(--ease);
  }
  .btn-gold:hover{ color:var(--bg); }
  .btn-gold:hover::before{ transform:translateX(0); }
  .btn-gold span{ position:relative; z-index:1; }
  .btn-gold:disabled{ opacity:0.38; cursor:not-allowed; }
  .btn-gold:disabled::before{ display:none; }
  .btn-ghost{
    width:100%; padding:17px; background:transparent;
    border:1px solid var(--hairline); color:var(--ivory);
    font-size:11px; letter-spacing:0.15em; text-transform:uppercase; cursor:pointer;
    transition:border-color .3s;
  }
  .btn-ghost:hover{ border-color:var(--claimed); }
  .btn-ghost:disabled{ opacity:0.38; cursor:not-allowed; }
  .claim-sub{ font-size:12px; color:var(--claimed); text-align:center; margin-bottom:52px; line-height:1.7; }
  .story-block{ margin-bottom:40px; }
  .story-block p{ font-size:15px; line-height:1.9; }
  .story-block p + p{ margin-top:16px; }
  .specs{ border-top:1px solid var(--hairline); padding-top:26px; }
  .spec-row{ display:flex; justify-content:space-between; padding:12px 0; border-bottom:1px solid var(--hairline); font-size:13px; }
  .spec-row span:first-child{ color:var(--muted); }

  /* ── CART ── */
  .narrow{ max-width:760px; margin:0 auto; padding:64px 48px 120px; }
  .page-head{ margin-bottom:48px; }
  .page-head h1{ font-family:'Fraunces', serif; font-weight:300; font-size:40px; margin-bottom:12px; }
  .page-head p{ color:var(--muted); font-size:14px; line-height:1.7; }
  .cart-row{
    display:flex; gap:22px; align-items:center;
    padding:22px 0; border-bottom:1px solid var(--hairline);
    transition:background .3s; border-radius:0;
  }
  .cart-row .frame{ width:88px; height:108px; aspect-ratio:auto; flex-shrink:0; }
  .cart-row .frame .frame-no{ font-size:10px; }
  .cart-row .frame .frame-label{ display:none; }
  .cart-row .meta{ flex:1; }
  .cart-row h4{ font-family:'Fraunces', serif; font-weight:400; font-size:18px; margin-bottom:5px; }
  .cart-row .origin{ font-size:12px; color:var(--muted); margin-bottom:4px; }
  .cart-row .price{ font-size:15px; font-family:'Fraunces', serif; }
  .cart-row .remove{
    background:none; border:none; color:var(--claimed); font-size:11px;
    letter-spacing:0.1em; text-transform:uppercase; cursor:pointer;
    text-decoration:none; border-bottom:1px solid transparent;
    transition:color .3s, border-color .3s; padding:0;
  }
  .cart-row .remove:hover{ color:var(--ivory); border-bottom-color:var(--ivory); }
  .cart-total{
    display:flex; justify-content:space-between; padding:28px 0;
    font-family:'Fraunces', serif; font-size:19px;
    border-bottom:1px solid var(--hairline); margin-bottom:32px;
  }
  .empty-state{ text-align:center; padding:70px 0; color:var(--muted); font-size:15px; }
  .empty-state a{ color:var(--gold); text-decoration:none; border-bottom:1px solid var(--gold); }

  /* ── CHECKOUT ── */
  .checkout-steps{
    display:flex; gap:0; margin-bottom:52px; border:1px solid var(--hairline);
  }
  .checkout-step{
    flex:1; text-align:center; padding:16px 12px; font-size:10px;
    letter-spacing:0.18em; text-transform:uppercase; color:var(--claimed);
    border-right:1px solid var(--hairline); position:relative;
  }
  .checkout-step:last-child{ border-right:none; }
  .checkout-step.active{ color:var(--gold); }
  .checkout-step.active::after{
    content:''; position:absolute; bottom:-1px; left:0; right:0; height:1px;
    background:var(--gold);
  }
  .checkout-step .step-num{
    display:block; font-family:'Fraunces', serif; font-size:18px; font-weight:300;
    margin-bottom:4px; color:inherit;
  }

  /* ── FORMS ── */
  .form-group{ margin-bottom:24px; }
  .form-row{ display:grid; grid-template-columns:1fr 1fr; gap:20px; }
  label{ display:block; font-size:10px; letter-spacing:0.14em; text-transform:uppercase; color:var(--muted); margin-bottom:9px; }
  input, textarea{
    width:100%; background:transparent; border:none; border-bottom:1px solid var(--hairline);
    color:var(--ivory); font-family:'Archivo', sans-serif; font-size:15px; padding:11px 2px;
    transition:border-color .3s; min-height:44px;
  }
  input:focus, textarea:focus{ border-color:var(--gold); outline:none; }
  textarea{ resize:vertical; min-height:110px; }
  fieldset{ border:none; margin:40px 0 0; }
  legend{ font-size:10px; letter-spacing:0.22em; text-transform:uppercase; color:var(--gold); margin-bottom:24px; padding:0; }
  .fine-print{ font-size:11px; color:var(--claimed); line-height:1.75; margin-top:20px; }

  /* ── CONFIRMATION ── */
  .confirm-seal{
    width:76px; height:76px; border:1px solid var(--gold); border-radius:50%;
    display:flex; align-items:center; justify-content:center; margin:0 auto 32px;
    animation:confirmPulse 1.2s var(--ease) forwards;
  }
  @keyframes confirmPulse{
    0%{ transform:scale(0.7); opacity:0; }
    60%{ transform:scale(1.08); opacity:1; }
    100%{ transform:scale(1); opacity:1; }
  }
  .confirm-wrap{ text-align:center; }
  .confirm-wrap h1{ font-family:'Fraunces', serif; font-weight:300; font-size:42px; margin-bottom:14px; }
  .confirm-wrap .order-id{ font-size:11px; letter-spacing:0.18em; text-transform:uppercase; color:var(--claimed); margin:26px 0 44px; }
  .confirm-list{ text-align:left; max-width:440px; margin:0 auto 44px; }
  .confirm-list .cart-row .remove{ display:none; }

  /* ── FOOTER ── */
  footer{
    border-top:1px solid var(--hairline); padding:52px 48px;
    display:flex; justify-content:space-between; align-items:center;
    font-size:11px; color:var(--claimed); letter-spacing:0.12em; text-transform:uppercase;
    position:relative; z-index:2;
  }
  .logo-mark{ font-family:'Fraunces', serif; font-size:18px; letter-spacing:0.18em; font-weight:500; }
  footer nav{ display:flex; gap:32px; }
  footer nav a{ color:var(--claimed); text-decoration:none; transition:color .3s; }
  footer nav a:hover{ color:var(--gold); }

  /* ── TOAST ── */
  #toast{
    position:fixed; bottom:36px; left:50%; transform:translateX(-50%) translateY(12px);
    background:var(--bg-card); border:1px solid var(--gold-mid);
    color:var(--ivory); padding:14px 28px; font-size:13px; white-space:nowrap;
    opacity:0; pointer-events:none; z-index:8000;
    transition:opacity .38s var(--ease), transform .38s var(--ease);
    backdrop-filter:blur(12px);
  }
  #toast.show{ opacity:1; transform:translateX(-50%) translateY(0); pointer-events:all; }
  #toast a{ color:var(--gold); }

  /* ── MISC ── */
  .vision-chapter{
    min-height:80vh; display:flex; flex-direction:column; align-items:center;
    justify-content:center; text-align:center;
    padding:80px 48px; border-top:1px solid var(--hairline);
  }
  .vision-chapter .chapter-no{ font-size:11px; color:var(--claimed); letter-spacing:0.25em; margin-bottom:20px; }
  .vision-chapter p{ font-family:'Fraunces', serif; font-weight:200; font-style:italic; font-size:clamp(24px,3.5vw,42px); line-height:1.5; max-width:780px; margin:0 auto; }

  /* ── RESPONSIVE ── */
  @media (max-width:900px){
    .grid{ grid-template-columns:repeat(2,1fr); }
    .archive-grid{ grid-template-columns:repeat(2,1fr); }
    .product{ grid-template-columns:1fr; gap:40px; padding:32px 24px 0; }
    header{ padding:20px 24px; }
    header.scrolled{ padding:14px 24px; }
    .nav-links{ display:none; }
    .menu-btn{ display:block; }
    .wrap{ padding:0 24px; }
    .section-head{ padding:70px 24px 36px; }
    .breadcrumb{ padding:22px 24px 0; }
    .narrow{ padding:48px 24px 80px; }
    footer{ flex-direction:column; gap:24px; text-align:center; padding:40px 24px; }
    footer nav{ flex-wrap:wrap; justify-content:center; gap:20px; }
    .manifesto{ padding:80px 24px; }
    .checkout-steps{ flex-direction:column; border:none; gap:0; }
    .checkout-step{ border-right:none; border-bottom:1px solid var(--hairline); }
    .form-row{ grid-template-columns:1fr; gap:0; }
  }
  @media (max-width:580px){
    .grid{ grid-template-columns:1fr; }
    .archive-grid{ grid-template-columns:1fr; }
    .hero-headline{ font-size:clamp(48px,14vw,80px); }
    .item{ padding:26px 20px 22px; }
  }
</style>
</head>
<body>

   CURRENCY
--------------------------------------------------------- */
const CURRENCIES = ['USD','EUR','GBP','INR','JPY'];
const RATES = { USD:1, EUR:0.92, GBP:0.79, INR:83.5, JPY:149.5 };
const SYMBOLS = { USD:'$', EUR:'€', GBP:'£', INR:'₹', JPY:'¥' };
const LOCALES = { USD:'en-US', EUR:'de-DE', GBP:'en-GB', INR:'en-IN', JPY:'ja-JP' };
let currentCurrency = 'USD';

function money(usdAmount){
  const rate = RATES[currentCurrency] || 1;
  const converted = Math.round(usdAmount * rate);
  return SYMBOLS[currentCurrency] + converted.toLocaleString(LOCALES[currentCurrency]);
}

let lastOrder = null;

function available(){ return PRODUCTS.filter(p => p.status === 'available'); }
function comingSoon(){ return PRODUCTS.filter(p => p.status === 'coming-soon'); }
function claimedList(){ return PRODUCTS.filter(p => p.status === 'claimed'); }
function findProduct(sku){ return PRODUCTS.find(p => p.sku === sku); }
function cartProducts(){ return cart.map(sku => findProduct(sku)).filter(Boolean); }
function cartTotal(){ return cartProducts().reduce((s,p) => s + (p.price||0), 0); }

/* ---------------------------------------------------------
   UTILS
--------------------------------------------------------- */
function escapeHtml(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function updateCartBadge(){
  const n = cart.length;
  ['cart-count-desktop','cart-count-mobile'].forEach(id => {
    const el = document.getElementById(id);
    if(!el) return;
    if(n > 0){ el.textContent = n; el.hidden = false; el.classList.add('bump'); setTimeout(() => el.classList.remove('bump'), 400); }
    else{ el.hidden = true; }
  });
}

function setActiveNav(route){
  document.querySelectorAll('[data-route]').forEach(a => {
    a.classList.toggle('active', a.dataset.route === route);
  });
}

let toastTimer;
function showToast(msg){
  const t = document.getElementById('toast');
  t.innerHTML = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 4200);
}

/* ---------------------------------------------------------
   FRAME (placeholder / sketch / photo)
--------------------------------------------------------- */
function frame(p, opts){
  opts = opts || {};
  const faded = !!opts.faded;
  if(p.image){
    const isReference = p.status === 'coming-soon';
    return `<div class="frame ${faded ? 'frame-faded' : ''} ${isReference ? 'frame-reference' : ''}">
      <img src="${p.image}" alt="${escapeHtml(p.title || '')}" loading="lazy">
      ${isReference ? `<span class="frame-label">Reference image — not the actual piece</span>` : ''}
    </div>`;
  }
  const sketch = SKETCHES[p.sku];
  if(sketch){
    const label = opts.label || 'Sketch — sourcing in progress';
    return `<div class="frame frame-sketch">
      <span class="corner tl"></span><span class="corner tr"></span><span class="corner bl"></span><span class="corner br"></span>
      <div class="sketch-art">${sketch}</div>
      <span class="frame-label">${label}</span>
    </div>`;
  }
  return `<div class="frame frame-waiting">
    <span class="corner tl"></span><span class="corner tr"></span><span class="corner bl"></span><span class="corner br"></span>
    <span class="frame-no serif">N° ${p.sku}</span>
    <span class="frame-label">${p.status === 'coming-soon' ? 'Sourcing in progress' : 'Object held by DOKU'}</span>
  </div>`;
}

/* ---------------------------------------------------------
   MARQUEE HTML
--------------------------------------------------------- */
function marqueeHtml(){
  const items = ['ONE OF ONE','NOT REPRODUCED','FOUND ONCE','NEVER RESTOCKED','HELD ONCE','THEN GONE'];
  const repeated = [...items, ...items].map(s => `<span>${s}</span><span class="gold">·</span>`).join('');
  return `<div class="marquee" aria-hidden="true"><div class="marquee-track">${repeated}</div></div>`;
}

function viewProduct(sku){
  const p = findProduct(sku);
  if(!p) return view404();
  const isAvailable = p.status === 'available';
  const isComingSoon = p.status === 'coming-soon';
  const inCart = cart.includes(sku);

  const related = PRODUCTS.filter(x => x.status === 'available' && x.sku !== sku).slice(0,3);

  const statusLabel = isAvailable ? '1 of 1 — Available'
    : isComingSoon ? 'Direction confirmed — object pending'
    : 'Claimed — no longer available';

  const originLine = isComingSoon
    ? "We haven't found this one yet."
    : `Found in ${p.origin}.${p.year ? ' Sourced by the DOKU team, ' + p.year + '.' : ''}`;

  let mainBlock;
  if(isAvailable){
    mainBlock = `
      <div class="price-row reveal">
        <span class="price serif">${money(p.price)}</span>
        <span class="price-note">No reproductions</span>
      </div>
      <button class="btn-gold reveal" data-action="hold" data-sku="${p.sku}" data-cursor="Hold" ${inCart ? 'disabled' : ''}><span>${inCart ? 'Held for you' : 'Hold this DOKU'}</span></button>
      <div class="claim-sub reveal">${inCart ? 'Review it in your cart to confirm the claim.' : 'Held until checkout. Nothing closes until you confirm.'}</div>
    `;
  } else if(isComingSoon){
    mainBlock = `
      <div class="price-row reveal">
        <span class="price serif" style="color:var(--muted);">Not yet priced</span>
        <span class="price-note">Coming soon</span>
      </div>
      <form id="notify-form" class="reveal" novalidate>
        <div class="form-group"><label for="notify-email">Notify me when it's found</label><input id="notify-email" type="email" required placeholder="you@email.com"></div>
        <button class="btn-gold" type="submit" data-cursor="Notify"><span>Notify me</span></button>
      </form>
      <div id="notify-result" class="claim-sub reveal" style="margin-top:14px;"></div>
    `;
  } else {
    mainBlock = `
      <div class="price-row reveal">
        <span class="price serif" style="color:var(--claimed);">Claimed</span>
        <span class="price-note">No reproductions</span>
      </div>
      <button class="btn-ghost reveal" disabled>This DOKU is gone</button>
      <div class="claim-sub reveal">${p.epitaph ? '"' + p.epitaph + '"' : 'Once claimed, a listing does not return.'}</div>
    `;
  }

  return `
    <div class="breadcrumb"><a href="#/collection">The Collection</a> &nbsp;/&nbsp; N° ${p.sku}</div>
    <div class="product wrap" style="padding-left:0; padding-right:0;">
      ${frame(p, { faded: !isAvailable && !isComingSoon })}
      <div class="product-info">
        <div class="seal-row reveal">
          <div class="seal"><span class="seal-no serif">${p.sku}</span></div>
          <span class="seal-status ${isAvailable ? '' : 'is-claimed'}">${statusLabel}</span>
        </div>
        <h1 class="serif reveal">${p.title}</h1>
        <div class="origin-line reveal">${originLine}</div>
        ${mainBlock}
        ${p.story ? `
          <div class="story-block reveal">
            <div class="eyebrow">The story</div>
            ${p.story.map(para => `<p>${para}</p>`).join('')}
          </div>` : ''}
        ${p.teaser ? `
          <div class="story-block reveal">
            <div class="eyebrow">What we're chasing</div>
            <p>${p.teaser}</p>
          </div>` : ''}
        ${p.specs ? `
          <div class="specs reveal">
            ${Object.entries(p.specs).map(([k,v]) => `<div class="spec-row"><span>${k}</span><span>${v}</span></div>`).join('')}
          </div>` : ''}
      </div>
    </div>
    ${related.length ? `
    <section class="section-head reveal">
      <div class="eyebrow">Also in the collection</div>
      <h2 class="serif">You may not see these again</h2>
    </section>
    <div class="grid wrap" style="padding:0; margin-bottom:100px;">

  `;
}

/* ---------------------------------------------------------
   ROUTER
--------------------------------------------------------- */
const ROUTES = {
  '': viewHome,
  'collection': () => viewCollection(),
  'archive': () => viewArchive(),
  'provenance': () => viewProvenance(),
  'inquire': () => viewInquire(),
  'cart': () => viewCart(),
  'checkout': () => viewCheckout(),
  'confirmation': () => viewConfirmation(),
};

const $app = document.getElementById('app');
const $veil = document.getElementById('veil');

function resolveView(){
  const path = (location.hash || '#/').slice(1).replace(/^\/|\/$/g, '');
  const parts = path.split('/').filter(Boolean);
  if(parts.length === 0) return { html: viewHome(), route: '' };
  if(parts[0] === 'item' && parts[1]) return { html: viewProduct(parts[1]), route: 'collection' };
  if(ROUTES[parts[0]]) return { html: ROUTES[parts[0]](), route: parts[0] };
  return { html: view404(), route: '' };
}

let firstRender = true;
function render(){
  const { html, route } = resolveView();

  const doSwap = () => {
    $app.innerHTML = html;
    window.scrollTo(0, 0);
    setActiveNav(route);
    updateCartBadge();
    initReveal();
    bindForms();
  };

  if(firstRender){ doSwap(); firstRender = false; return; }

  $veil.classList.add('active');
  setTimeout(() => {
    doSwap();
    setTimeout(() => $veil.classList.remove('active'), 60);
  }, 280);
}

function initReveal(){
  const els = $app.querySelectorAll('.reveal');
  els.forEach((el, i) => { el.style.transitionDelay = Math.min(i * 45, 340) + 'ms'; });
  const io = new IntersectionObserver(entries => {
    entries.forEach(e => { if(e.isIntersecting){ e.target.classList.add('in'); io.unobserve(e.target); } });
  }, { threshold: 0.1 });
  els.forEach(el => io.observe(el));
}

window.addEventListener('hashchange', render);
window.addEventListener('DOMContentLoaded', render);

/* ---------------------------------------------------------
   INTERACTIONS
--------------------------------------------------------- */
$app.addEventListener('click', (e) => {
  const btn = e.target.closest('[data-action]');
  if(!btn) return;
  const action = btn.dataset.action;
  const sku = btn.dataset.sku;
  if(action === 'hold'){
    if(!cart.includes(sku)){
      cart.push(sku);
      updateCartBadge();
      showToast(`Held for you — <a href="#/cart">view cart (${cart.length})</a>`);
      render();
    }
  }
  if(action === 'remove'){ cart = cart.filter(s => s !== sku); updateCartBadge(); render(); }
  if(action === 'goto-checkout'){ location.hash = '#/checkout'; }
});

function bindForms(){
  const co = document.getElementById('checkout-form');
  if(co){
    co.addEventListener('submit', (e) => {
      e.preventDefault();
      const data = new FormData(co);
      const items = cartProducts();
      const submitBtn = document.getElementById('checkout-submit');
      const submitSpan = submitBtn.querySelector('span');
      submitBtn.disabled = true;
      if(submitSpan) submitSpan.textContent = 'Confirming…';
      setTimeout(() => {
        items.forEach(p => { p.status = 'claimed'; p.epitaph = p.epitaph || 'Claimed moments ago.'; });
        lastOrder = {
          id: 'DOKU-' + Math.random().toString(36).slice(2,8).toUpperCase(),
          items, fullName: data.get('fullName')
        };
        cart = []; updateCartBadge(); location.hash = '#/confirmation';
      }, 800);
    });
  }

  const iq = document.getElementById('inquire-form');
  if(iq){
    iq.addEventListener('submit', (e) => {
      e.preventDefault();
      document.getElementById('inquire-result').textContent = 'Message received. We read everything ourselves.';
      iq.reset();
    });
  }

  const notify = document.getElementById('notify-form');
  if(notify){
    notify.addEventListener('submit', (e) => {
      e.preventDefault();
      document.getElementById('notify-result').textContent = "Noted. We'll let you know the moment it exists.";
      notify.reset();
    });
  }
}

});

document.getElementById('menu-btn').addEventListener('click', () => document.getElementById('mobile-menu').classList.add('open'));
document.getElementById('menu-close').addEventListener('click', () => document.getElementById('mobile-menu').classList.remove('open'));
document.querySelectorAll('#mobile-menu a').forEach(a => a.addEventListener('click', () => document.getElementById('mobile-menu').classList.remove('open')));

/* SCROLL-AWARE NAV */
const $header = document.getElementById('site-header');
window.addEventListener('scroll', () => {
  $header.classList.toggle('scrolled', window.scrollY > 60);
}, { passive: true });

/* HERO PARALLAX */
window.addEventListener('scroll', () => {
  const heroInner = document.querySelector('.hero-inner');
  if(!heroInner) return;
  const y = window.scrollY;
  heroInner.style.transform = `translateY(${y * 0.28}px)`;
  heroInner.style.opacity = Math.max(0, 1 - y / 500);
}, { passive: true });

/* ---------------------------------------------------------
   CUSTOM CURSOR + WEIGHTED SCROLL
--------------------------------------------------------- */
const hasFinePointer = window.matchMedia('(hover: hover) and (pointer: fine)').matches;
const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

if(hasFinePointer){ initCustomCursor(); if(!prefersReducedMotion) initWeightedScroll(); }

function initCustomCursor(){
  const cursorEl = document.getElementById('cursor');
  const labelEl = document.getElementById('cursor-label');
  let mx = window.innerWidth / 2, my = window.innerHeight / 2;
  let cx = mx, cy = my;

  window.addEventListener('mousemove', (e) => {
    mx = e.clientX; my = e.clientY; cursorEl.classList.add('ready');
  });

  (function raf(){
    cx += (mx - cx) * 0.18;
    cy += (my - cy) * 0.18;
    cursorEl.style.left = cx + 'px';
    cursorEl.style.top = cy + 'px';
    requestAnimationFrame(raf);
  })();

  document.addEventListener('mouseover', (e) => {
    const labeled = e.target.closest('[data-cursor]');
    const generic = e.target.closest('a, button');
    if(labeled && !labeled.disabled){
      cursorEl.classList.add('labeled'); cursorEl.classList.remove('hover');
      labelEl.textContent = labeled.dataset.cursor;
    } else if(generic && !generic.disabled){ cursorEl.classList.add('hover'); }
  });
  document.addEventListener('mouseout', (e) => {
    if(e.target.closest('[data-cursor], a, button')){
      cursorEl.classList.remove('hover','labeled'); labelEl.textContent = '';
    }
  });
  document.addEventListener('mousedown', () => cursorEl.classList.add('click'));
  document.addEventListener('mouseup', () => cursorEl.classList.remove('click'));
}

function initWeightedScroll(){
  let target = window.scrollY, current = window.scrollY, raf = null;
  function maxScroll(){ return Math.max(0, document.documentElement.scrollHeight - window.innerHeight); }
  function tick(){
    current += (target - current) * 0.11;
    if(Math.abs(target - current) < 0.4){ current = target; window.scrollTo(0, current); raf = null; return; }
    window.scrollTo(0, current); raf = requestAnimationFrame(tick);
  }
  window.addEventListener('wheel', (e) => {
    e.preventDefault();
    target = Math.max(0, Math.min(target + e.deltaY, maxScroll()));
    if(!raf) raf = requestAnimationFrame(tick);
  }, { passive:false });
  window.addEventListener('scroll', () => { if(!raf){ target = window.scrollY; current = window.scrollY; } });
}
</script>
