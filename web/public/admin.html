<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>DOKU — Admin</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,200;0,9..144,300;0,9..144,400;1,9..144,200;1,9..144,300&family=Archivo:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0E0C0A; --bg-card:#161310; --ivory:#EDE6D6; --muted:#9A9086;
    --gold:#B08D57; --gold-soft:rgba(176,141,87,0.12); --hairline:#2B2620;
    --claimed:#6B6258; --ok:#7C9070; --err:#B5766A;
    --ease:cubic-bezier(.16,1,.3,1);
  }
  *{ box-sizing:border-box; }
  body{
    margin:0; background:var(--bg); color:var(--ivory);
    font-family:'Archivo',sans-serif; font-size:14px; line-height:1.6;
    -webkit-font-smoothing:antialiased;
  }
  a{ color:var(--gold); }
  .serif{ font-family:'Fraunces',serif; }
  .eyebrow{ font-size:11px; letter-spacing:0.18em; text-transform:uppercase; color:var(--gold); }
  .muted{ color:var(--muted); }
  label{ display:block; font-size:11px; letter-spacing:0.14em; text-transform:uppercase; color:var(--muted); margin-bottom:6px; }
  input, select, textarea{
    width:100%; background:transparent; color:var(--ivory);
    border:1px solid var(--hairline); border-radius:0; padding:10px 12px;
    font-family:'Archivo',sans-serif; font-size:14px; outline:none;
    transition:border-color .3s var(--ease);
  }
  input:focus, select:focus, textarea:focus{ border-color:var(--gold); }
  textarea{ resize:vertical; min-height:70px; }
  select{ appearance:none; cursor:pointer; }
  button{
    font-family:'Archivo',sans-serif; font-size:11px; letter-spacing:0.14em;
    text-transform:uppercase; cursor:pointer; padding:11px 22px;
    background:transparent; color:var(--gold); border:1px solid var(--gold);
    transition:background .3s var(--ease), color .3s var(--ease), border-color .3s;
  }
  button:hover{ background:var(--gold); color:var(--bg); }
  button.ghost{ border-color:var(--hairline); color:var(--muted); }
  button.ghost:hover{ background:transparent; border-color:var(--claimed); color:var(--ivory); }
  button.danger{ border-color:var(--hairline); color:var(--claimed); }
  button.danger:hover{ background:transparent; border-color:var(--err); color:var(--err); }
  button:disabled{ opacity:0.5; cursor:default; }

  /* LOGIN */
  #login-view{ min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
  .login-card{ width:100%; max-width:380px; }
  .login-card .brand{ font-size:28px; letter-spacing:0.16em; font-weight:300; margin-bottom:4px; }
  .login-card form{ margin-top:32px; display:flex; flex-direction:column; gap:18px; }
  .login-card button{ margin-top:8px; }

  /* DASHBOARD */
  #dash-view{ display:none; max-width:1080px; margin:0 auto; padding:32px 24px 120px; }
  header.bar{ display:flex; justify-content:space-between; align-items:baseline; border-bottom:1px solid var(--hairline); padding-bottom:20px; margin-bottom:24px; }
  header.bar .brand{ font-size:20px; letter-spacing:0.16em; font-weight:300; }
  .tabs{ display:flex; gap:4px; margin-bottom:28px; }
  .tab{ padding:9px 18px; font-size:11px; letter-spacing:0.14em; text-transform:uppercase; color:var(--muted); border:1px solid transparent; border-bottom-color:var(--hairline); cursor:pointer; background:none; }
  .tab.active{ color:var(--gold); border-color:var(--hairline); border-bottom-color:transparent; background:var(--bg-card); }
  .panel{ display:none; }
  .panel.active{ display:block; }

  .row-card{ background:var(--bg-card); border:1px solid var(--hairline); padding:20px; margin-bottom:14px; }
  .row-head{ display:flex; justify-content:space-between; align-items:baseline; gap:12px; margin-bottom:14px; }
  .row-head h3{ margin:0; font-size:17px; font-weight:300; }
  .sku-badge{ font-size:11px; letter-spacing:0.14em; color:var(--muted); }
  .status-pill{ font-size:10px; letter-spacing:0.12em; text-transform:uppercase; padding:3px 9px; border:1px solid var(--hairline); }
  .status-available{ color:var(--gold); border-color:var(--gold); }
  .status-reserved{ color:#C9A15E; border-color:#C9A15E; }
  .status-claimed{ color:var(--claimed); }
  .status-coming-soon{ color:var(--muted); }
  .grid2{ display:grid; grid-template-columns:1fr 1fr; gap:14px; }
  .grid3{ display:grid; grid-template-columns:1fr 1fr 1fr; gap:14px; }
  .field{ margin-bottom:14px; }
  .row-actions{ display:flex; gap:10px; margin-top:16px; align-items:center; }
  .row-msg{ font-size:12px; margin-left:auto; }
  .row-msg.ok{ color:var(--ok); }
  .row-msg.err{ color:var(--err); }
  details.adv summary{ cursor:pointer; color:var(--muted); font-size:11px; letter-spacing:0.12em; text-transform:uppercase; margin:6px 0 12px; }
  .reserved-flag{ background:var(--gold-soft); border-left:2px solid var(--gold); padding:8px 12px; font-size:12px; color:var(--ivory); margin-bottom:14px; }

  .order-card{ background:var(--bg-card); border:1px solid var(--hairline); padding:18px 20px; margin-bottom:12px; }
  .order-code{ font-size:12px; letter-spacing:0.14em; color:var(--gold); }
  .order-meta{ font-size:13px; color:var(--muted); margin-top:6px; }
  .order-meta strong{ color:var(--ivory); font-weight:400; }
  .empty{ color:var(--muted); padding:40px 0; text-align:center; }
  .toast{ position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(20px); background:var(--bg-card); border:1px solid var(--hairline); padding:12px 22px; font-size:13px; opacity:0; pointer-events:none; transition:.4s var(--ease); }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }
  .form-note{ font-size:12px; color:var(--muted); margin-top:4px; }
  @media(max-width:640px){ .grid2,.grid3{ grid-template-columns:1fr; } }
</style>
</head>
<body>

<div id="login-view">
  <div class="login-card">
    <div class="eyebrow">DOKU</div>
    <div class="brand serif">Admin</div>
    <p class="muted" style="font-size:13px;">The room behind the vitrine.</p>
    <form id="login-form">
      <div><label for="email">Email</label><input id="email" type="email" required autocomplete="username"></div>
      <div><label for="password">Password</label><input id="password" type="password" required autocomplete="current-password"></div>
      <button type="submit" id="login-btn">Enter</button>
      <div id="login-err" class="row-msg err"></div>
    </form>
  </div>
</div>

<div id="dash-view">
  <header class="bar">
    <div class="brand serif">DOKU <span class="muted" style="font-size:12px; letter-spacing:0.14em;">/ ADMIN</span></div>
    <div class="muted" style="font-size:12px;"><span id="who"></span> · <a href="#" id="signout">Sign out</a></div>
  </header>

  <div class="tabs">
    <button class="tab active" data-tab="catalog">Catalog</button>
    <button class="tab" data-tab="orders">Orders</button>
    <button class="tab" data-tab="account">Account</button>
  </div>

  <div class="panel active" id="panel-catalog">
    <div style="display:flex; justify-content:space-between; align-items:baseline; margin-bottom:18px;">
      <div class="eyebrow">The catalog</div>
      <button id="add-toggle">+ New object</button>
    </div>
    <div id="add-form" class="row-card" style="display:none;"></div>
    <div id="products"></div>
  </div>

  <div class="panel" id="panel-orders">
    <div class="eyebrow" style="margin-bottom:18px;">Orders — held & claimed</div>
    <div id="orders"></div>
  </div>

  <div class="panel" id="panel-account">
    <div class="eyebrow" style="margin-bottom:18px;">Account</div>
    <div class="row-card" style="max-width:420px;">
      <div class="field"><label for="new-pass">New password</label><input id="new-pass" type="password" autocomplete="new-password" placeholder="Set a real password"></div>
      <p class="form-note">You logged in with a temporary password. Set your own — it's stored hashed by Supabase, never in this file.</p>
      <div class="row-actions"><button id="change-pass">Update password</button><span id="pass-msg" class="row-msg"></span></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://mudyipmizlvihcldzrvh.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im11ZHlpcG1pemx2aWhjbGR6cnZoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMwOTA3NjEsImV4cCI6MjA5ODY2Njc2MX0.HXiBras1oUQfYuRnjSt3gde8Y5Jl0kSECnGfkd68f2Y';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const STATUSES = ['available','reserved','claimed','coming-soon'];
const ORDER_STATUSES = ['reserved','confirmed','shipped','delivered'];

const $ = s => document.querySelector(s);
const esc = s => (s==null?'':String(s)).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
function toast(msg){ const t=$('#toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2200); }

/* ---- AUTH ---- */
async function boot(){
  const { data:{ session } } = await sb.auth.getSession();
  if(session){
    const { data:isAdmin } = await sb.rpc('is_admin');
    if(isAdmin){ showDash(session); return; }
    await sb.auth.signOut();
  }
  showLogin();
}
function showLogin(){ $('#login-view').style.display='flex'; $('#dash-view').style.display='none'; }
function showDash(session){
  $('#login-view').style.display='none'; $('#dash-view').style.display='block';
  $('#who').textContent = session.user.email;
  loadProducts(); loadOrders();
}

$('#login-form').addEventListener('submit', async e => {
  e.preventDefault();
  const btn=$('#login-btn'), err=$('#login-err');
  err.textContent=''; btn.disabled=true; btn.textContent='…';
  const { data, error } = await sb.auth.signInWithPassword({ email:$('#email').value.trim(), password:$('#password').value });
  if(error){ err.textContent = 'That didn’t open. Check the email and password.'; btn.disabled=false; btn.textContent='Enter'; return; }
  const { data:isAdmin } = await sb.rpc('is_admin');
  if(!isAdmin){ err.textContent='This account isn’t an admin.'; await sb.auth.signOut(); btn.disabled=false; btn.textContent='Enter'; return; }
  btn.disabled=false; btn.textContent='Enter';
  showDash(data.session);
});

$('#signout').addEventListener('click', async e => { e.preventDefault(); await sb.auth.signOut(); showLogin(); });

/* ---- TABS ---- */
document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => {
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(x=>x.classList.remove('active'));
  t.classList.add('active');
  $('#panel-'+t.dataset.tab).classList.add('active');
}));

/* ---- CATALOG ---- */
function specsToText(o){ if(!o) return ''; return Object.entries(o).map(([k,v])=>k+': '+v).join('\n'); }
function textToSpecs(t){ const o={}; (t||'').split('\n').forEach(l=>{ const i=l.indexOf(':'); if(i>0){ o[l.slice(0,i).trim()]=l.slice(i+1).trim(); } }); return Object.keys(o).length?o:null; }
function storyToText(a){ return Array.isArray(a)?a.join('\n\n'):''; }
function textToStory(t){ const a=(t||'').split('\n\n').map(s=>s.trim()).filter(Boolean); return a.length?a:null; }

function productCard(p){
  const imgNote = p.image ? `image set (${(p.image.length/1024|0)} KB)` : 'no image';
  return `<div class="row-card" data-sku="${esc(p.sku)}">
    <div class="row-head">
      <h3 class="serif">${esc(p.title||'Untitled')} <span class="sku-badge">N° ${esc(p.sku)}</span></h3>
      <span class="status-pill status-${esc(p.status)}">${esc(p.status)}</span>
    </div>
    ${p.status==='reserved' ? `<div class="reserved-flag">Held by a buyer. Confirm payment, then set status to <strong>claimed</strong> and write an epitaph below — or set back to <strong>available</strong> to release it.</div>` : ''}
    <div class="grid3">
      <div class="field"><label>Title</label><input data-f="title" value="${esc(p.title)}"></div>
      <div class="field"><label>Status</label><select data-f="status">${STATUSES.map(s=>`<option ${s===p.status?'selected':''}>${s}</option>`).join('')}</select></div>
      <div class="field"><label>Price (USD)</label><input data-f="price" type="number" value="${p.price??''}"></div>
    </div>
    <div class="grid3">
      <div class="field"><label>Origin</label><input data-f="origin" value="${esc(p.origin)}"></div>
      <div class="field"><label>Year</label><input data-f="year" value="${esc(p.year)}"></div>
      <div class="field"><label>Sort order</label><input data-f="sort_order" type="number" value="${p.sort_order??0}"></div>
    </div>
    <div class="field"><label>Epitaph (claimed items)</label><input data-f="epitaph" value="${esc(p.epitaph)}"></div>
    <div class="field"><label>Teaser (coming-soon items)</label><input data-f="teaser" value="${esc(p.teaser)}"></div>
    <details class="adv">
      <summary>Story · specs · image</summary>
      <div class="field"><label>Story (one paragraph per blank line)</label><textarea data-f="story">${esc(storyToText(p.story))}</textarea></div>
      <div class="field"><label>Specs (one "Key: value" per line)</label><textarea data-f="specs">${esc(specsToText(p.specs))}</textarea></div>
      <div class="grid2">
        <div class="field"><label>Reference image?</label><select data-f="reference_image"><option value="false" ${!p.reference_image?'selected':''}>No</option><option value="true" ${p.reference_image?'selected':''}>Yes — show disclosure</option></select></div>
        <div class="field"><label>Image (${imgNote})</label><textarea data-f="image" placeholder="data:image/... or /path">${esc(p.image)}</textarea></div>
      </div>
    </details>
    <div class="row-actions">
      <button data-act="save">Save</button>
      <button class="danger" data-act="delete">Delete</button>
      <span class="row-msg"></span>
    </div>
  </div>`;
}

function readCard(card){
  const g=f=>card.querySelector(`[data-f="${f}"]`);
  const num=v=>v===''||v==null?null:Number(v);
  return {
    title:g('title').value.trim(), status:g('status').value, price:num(g('price').value),
    origin:g('origin').value.trim()||null, year:g('year').value.trim()||null,
    sort_order:num(g('sort_order').value)||0, epitaph:g('epitaph').value.trim()||null,
    teaser:g('teaser').value.trim()||null, story:textToStory(g('story').value),
    specs:textToSpecs(g('specs').value), reference_image:g('reference_image').value==='true',
    image:g('image').value.trim()||null
  };
}

async function loadProducts(){
  const { data, error } = await sb.from('products').select('*').order('sort_order',{ascending:true});
  const box=$('#products');
  if(error){ box.innerHTML=`<div class="empty">Couldn’t load the catalog.</div>`; return; }
  box.innerHTML = data.length ? data.map(productCard).join('') : `<div class="empty">No objects yet.</div>`;
}

$('#products').addEventListener('click', async e => {
  const btn=e.target.closest('button'); if(!btn) return;
  const card=e.target.closest('.row-card'); const sku=card.dataset.sku; const msg=card.querySelector('.row-msg');
  if(btn.dataset.act==='save'){
    btn.disabled=true; msg.className='row-msg'; msg.textContent='Saving…';
    const { error } = await sb.from('products').update(readCard(card)).eq('sku',sku);
    btn.disabled=false;
    if(error){ msg.className='row-msg err'; msg.textContent=error.message; }
    else { msg.className='row-msg ok'; msg.textContent='Saved'; toast('N° '+sku+' updated'); loadProducts(); }
  }
  if(btn.dataset.act==='delete'){
    if(!confirm(`Delete N° ${sku}? This cannot be undone.`)) return;
    const { error } = await sb.from('products').delete().eq('sku',sku);
    if(error){ msg.className='row-msg err'; msg.textContent=error.message; }
    else { toast('N° '+sku+' deleted'); loadProducts(); }
  }
});

/* ---- ADD PRODUCT ---- */
$('#add-toggle').addEventListener('click', ()=>{
  const f=$('#add-form');
  if(f.style.display==='none'){
    f.style.display='block'; $('#add-toggle').textContent='Close';
    f.innerHTML = `
      <div class="row-head"><h3 class="serif">New object</h3></div>
      <div class="grid3">
        <div class="field"><label>SKU *</label><input data-f="sku" placeholder="022"></div>
        <div class="field"><label>Title *</label><input data-f="title"></div>
        <div class="field"><label>Status</label><select data-f="status">${STATUSES.map(s=>`<option ${s==='available'?'selected':''}>${s}</option>`).join('')}</select></div>
      </div>
      <div class="grid3">
        <div class="field"><label>Price (USD)</label><input data-f="price" type="number"></div>
        <div class="field"><label>Origin</label><input data-f="origin"></div>
        <div class="field"><label>Year</label><input data-f="year"></div>
      </div>
      <div class="field"><label>Teaser (coming-soon)</label><input data-f="teaser"></div>
      <details class="adv"><summary>Story · specs · image</summary>
        <div class="field"><label>Story</label><textarea data-f="story"></textarea></div>
        <div class="field"><label>Specs (Key: value per line)</label><textarea data-f="specs"></textarea></div>
        <div class="grid2">
          <div class="field"><label>Reference image?</label><select data-f="reference_image"><option value="false">No</option><option value="true">Yes</option></select></div>
          <div class="field"><label>Image</label><textarea data-f="image"></textarea></div>
        </div>
      </details>
      <div class="row-actions"><button data-act="create">Create object</button><span class="row-msg"></span></div>`;
  } else { f.style.display='none'; $('#add-toggle').textContent='+ New object'; }
});

$('#add-form').addEventListener('click', async e => {
  const btn=e.target.closest('button[data-act="create"]'); if(!btn) return;
  const f=$('#add-form'); const msg=f.querySelector('.row-msg');
  const sku=f.querySelector('[data-f="sku"]').value.trim();
  const body=readCard(f); body.sku=sku;
  if(!sku || !body.title){ msg.className='row-msg err'; msg.textContent='SKU and title are required.'; return; }
  btn.disabled=true; msg.className='row-msg'; msg.textContent='Creating…';
  const { error } = await sb.from('products').insert(body);
  btn.disabled=false;
  if(error){ msg.className='row-msg err'; msg.textContent=error.message; }
  else { toast('N° '+sku+' created'); $('#add-toggle').click(); loadProducts(); }
});

/* ---- ORDERS ---- */
async function loadOrders(){
  const { data, error } = await sb.from('orders').select('*').order('created_at',{ascending:false});
  const box=$('#orders');
  if(error){ box.innerHTML=`<div class="empty">Couldn’t load orders.</div>`; return; }
  if(!data.length){ box.innerHTML=`<div class="empty">No orders yet.</div>`; return; }
  const groups={};
  data.forEach(o=>{ (groups[o.order_code]=groups[o.order_code]||[]).push(o); });
  box.innerHTML = Object.entries(groups).map(([code,rows])=>{
    const o=rows[0];
    const items=rows.map(r=>`${esc(r.title)} — ${r.currency} ${r.price}`).join(' · ');
    return `<div class="order-card" data-code="${esc(code)}">
      <div class="order-code">${esc(code)}</div>
      <div class="order-meta"><strong>${esc(o.full_name)}</strong> — ${esc(o.email)}</div>
      <div class="order-meta">${esc(o.address)}, ${esc(o.city)} ${esc(o.postcode)}, ${esc(o.country)}</div>
      <div class="order-meta">${items}</div>
      <div class="order-meta muted" style="font-size:11px;">${new Date(o.created_at).toLocaleString()}</div>
      <div class="grid2" style="margin-top:12px;">
        <div class="field"><label>Fulfillment status (buyer sees this)</label><select data-f="order_status">${ORDER_STATUSES.map(s=>`<option ${s===(o.order_status||'reserved')?'selected':''}>${s}</option>`).join('')}</select></div>
        <div class="field"><label>Tracking note (shown to buyer once shipped)</label><input data-f="tracking_note" value="${esc(o.tracking_note)}"></div>
      </div>
      <div class="row-actions">
        <button data-act="save-status">Save status</button>
        ${o.refund_id
          ? `<span class="row-msg ok">Refunded ${esc(o.refund_id)}</span>`
          : (o.razorpay_payment_id ? `<button class="danger" data-act="refund">Refund</button>` : '')}
        <span class="row-msg"></span>
      </div>
    </div>`;
  }).join('');
}

$('#orders').addEventListener('click', async e => {
  const btn=e.target.closest('button'); if(!btn) return;
  const card=e.target.closest('.order-card'); const code=card.dataset.code; const msg=card.querySelector('.row-msg:last-child');

  if(btn.dataset.act==='save-status'){
    const status=card.querySelector('[data-f="order_status"]').value;
    const note=card.querySelector('[data-f="tracking_note"]').value.trim()||null;
    btn.disabled=true; msg.className='row-msg'; msg.textContent='Saving…';
    // Updates every row sharing this order_code (one row per item). Allowed by the
    // "Admins update orders" RLS policy — anon/buyers can't reach this.
    const { error } = await sb.from('orders').update({ order_status:status, tracking_note:note }).eq('order_code',code);
    btn.disabled=false;
    if(error){ msg.className='row-msg err'; msg.textContent=error.message; }
    else { msg.className='row-msg ok'; msg.textContent='Status saved.'; toast('Order '+code+' → '+status); }
    return;
  }

  if(btn.dataset.act==='refund'){
    if(!confirm(`Refund order ${code} in full via Razorpay? This cannot be undone.`)) return;
    btn.disabled=true; msg.className='row-msg'; msg.textContent='Refunding…';
    // Calls the razorpay-refund Edge Function with the admin's own session —
    // it re-checks is_admin() server-side and calls Razorpay directly. Never
    // done as a plain table update: a refund has to actually happen at
    // Razorpay before we're allowed to say it did.
    const { data, error } = await sb.functions.invoke('razorpay-refund', { body: { order_code: code } });
    btn.disabled=false;
    if(error || data?.error){ msg.className='row-msg err'; msg.textContent=data?.error || error.message; }
    else { toast('Order '+code+' refunded'); loadOrders(); }
    return;
  }
});

/* ---- ACCOUNT ---- */
$('#change-pass').addEventListener('click', async ()=>{
  const pass=$('#new-pass').value; const msg=$('#pass-msg'); const btn=$('#change-pass');
  if(pass.length<8){ msg.className='row-msg err'; msg.textContent='At least 8 characters.'; return; }
  btn.disabled=true; msg.className='row-msg'; msg.textContent='Updating…';
  const { error } = await sb.auth.updateUser({ password:pass });
  btn.disabled=false;
  if(error){ msg.className='row-msg err'; msg.textContent=error.message; }
  else { msg.className='row-msg ok'; msg.textContent='Password updated.'; $('#new-pass').value=''; toast('Password changed'); }
});

boot();
</script>
</body>
</html>
